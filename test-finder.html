<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<title>TEST FINDER</title>
<link href="style.css" rel="stylesheet"/>
<style>
body { background: #f0f0f0; padding: 40px; }
.test-output { background: #000; color: #0f0; padding: 20px; font-family: monospace; margin-bottom: 30px; white-space: pre-wrap; }
</style>
</head>
<body>
<h1>TEST DEL CERCA CARRELLI</h1>
<div class="test-output" id="test-log">Caricamento test...</div>

<!-- Copio ESATTAMENTE la struttura del finder dalla home -->
<section class="finder-section" id="finder">
<div class="section-container">
<div class="finder-widget">
<div class="finder-sidebar">
<h3>CERCA CARRELLI</h3>
<div class="filter-group" style="margin-bottom: 12px;">
<select class="finder-select" id="filter-categoria" name="categoria">
<option value="">Tutti i prodotti</option>
<option value="frontali">Carrelli Frontali</option>
<option value="magazzino">Carrelli magazzino</option>
<option value="transpallet">Transpallet</option>
<option value="occasioni">Occasioni</option>
</select>
</div>
<div class="filter-group" style="margin-bottom: 12px;">
<select class="finder-select" id="filter-anno" name="anno">
<option value="">Anno</option>
</select>
</div>
<div class="filter-group" style="margin-bottom: 12px;">
<select class="finder-select" id="filter-alimentazione" name="alimentazione">
<option value="">Tutte le alimentazioni</option>
</select>
</div>
<div class="filter-group" style="margin-bottom: 12px;">
<select class="finder-select" id="filter-portata" name="portata">
<option value="">Portata Kg.</option>
</select>
</div>
<div class="filter-group" style="margin-bottom: 12px;">
<select class="finder-select" id="filter-sollevamento" name="sollevamento">
<option value="">Sollevamento mm.</option>
</select>
</div>
<div class="filter-group" style="margin-bottom: 12px;">
<select class="finder-select" id="filter-marca" name="marca">
<option value="">Tutte le marche</option>
</select>
</div>
<button type="button" id="btn-finder-cerca">Cerca</button>
</div>
<div class="finder-results">
<div class="results-header">
<span class="results-count" id="results-count">Carrelli trovati</span>
<button class="btn btn-secondary" onclick="resetFilters()" style="padding: 6px 12px; font-size: 0.8rem;">Reset Filtri</button>
</div>
<div class="results-grid" id="results-grid">
<!-- Dynamically filled -->
</div>
</div>
</div>
</div>
</section>

<script>
// Log di debug visuale
const logEl = document.getElementById('test-log');
function log(msg) {
    logEl.textContent += '\n' + msg;
    console.log(msg);
}

log('=== TEST INIZIATO ===');
log('document.readyState: ' + document.readyState);

// Verifico che gli elementi DOM esistano
const ids = ['results-grid', 'results-count', 'filter-categoria', 'filter-anno', 
             'filter-alimentazione', 'filter-portata', 'filter-sollevamento', 
             'filter-marca', 'btn-finder-cerca'];
ids.forEach(id => {
    const el = document.getElementById(id);
    log(id + ': ' + (el ? '✓ TROVATO' : '✗ MANCANTE'));
});

// Definisco PRODUCTS con 3 prodotti di test
const PRODUCTS = [
    {
        id: 'test1', name: 'STILL RX 60-25', brand: 'Frontale',
        image: '', tag: 'Test', tagClass: 'usato', link: '#',
        isOccasione: true,
        specs: { marca: 'STILL', modello: 'RX 60-25', matricola: 'TEST1',
                 anno: '2020', alimentazione: 'Elettrico', portata: '2500 kg',
                 altezza: '4200 mm', tipologia: 'frontali' },
        description: 'Test prodotto 1', price: 'Test'
    },
    {
        id: 'test2', name: 'STILL ECH 12 C', brand: 'Transpallet',
        image: '', tag: 'Promo', tagClass: 'litio', link: '#',
        isOccasione: false,
        specs: { marca: 'STILL', modello: 'ECH 12 C', matricola: 'TEST2',
                 anno: '2026', alimentazione: 'Ioni di Litio', portata: '1200 kg',
                 altezza: '115 mm', tipologia: 'transpallet' },
        description: 'Test prodotto 2', price: '€ 1.150,00'
    },
    {
        id: 'test3', name: 'STILL EXV 14', brand: 'Stoccatore',
        image: '', tag: 'Usato', tagClass: 'usato', link: '#',
        isOccasione: true,
        specs: { marca: 'STILL', modello: 'EXV 14', matricola: 'TEST3',
                 anno: '2017', alimentazione: 'Elettrico', portata: '1400 kg',
                 altezza: '4800 mm', tipologia: 'magazzino' },
        description: 'Test prodotto 3', price: 'Noleggio'
    }
];

log('\nPRODUCTS definito: ' + PRODUCTS.length + ' prodotti');

// Ora eseguo initForkliftFinder
try {
    log('\n--- Esecuzione initForkliftFinder ---');
    
    const resultsGrid = document.getElementById('results-grid');
    const resultsCount = document.getElementById('results-count');
    const selectCategoria = document.getElementById('filter-categoria');
    const selectAnno = document.getElementById('filter-anno');
    const selectAlimentazione = document.getElementById('filter-alimentazione');
    const selectPortata = document.getElementById('filter-portata');
    const selectSollevamento = document.getElementById('filter-sollevamento');
    const selectMarca = document.getElementById('filter-marca');
    const btnCerca = document.getElementById('btn-finder-cerca');

    if (!resultsGrid) {
        log('ERRORE: results-grid NON trovato!');
    } else {
        log('results-grid trovato: ' + resultsGrid.tagName);
    }

    function parseVal(val) {
        if (!val) return 0;
        const clean = val.toString().replace(/\D/g, '');
        return clean ? parseInt(clean, 10) : 0;
    }

    function renderProducts() {
        const cat = selectCategoria ? selectCategoria.value : '';
        const anno = selectAnno ? selectAnno.value : '';
        const alim = selectAlimentazione ? selectAlimentazione.value : '';
        const portata = selectPortata ? selectPortata.value : '';
        const sollevamento = selectSollevamento ? selectSollevamento.value : '';
        const marca = selectMarca ? selectMarca.value : '';

        log('Filtri: cat=' + cat + ', anno=' + anno + ', alim=' + alim);

        const filtered = PRODUCTS.filter(prod => {
            let matchCat = !cat || (cat === 'occasioni' ? prod.isOccasione : prod.specs.tipologia === cat);
            let matchAnno = !anno || prod.specs.anno === anno;
            let matchAlim = true;
            if (alim) {
                const prodAlim = prod.specs.alimentazione.toLowerCase();
                if (alim === 'diesel') matchAlim = prodAlim === 'diesel' || prodAlim === 'gpl';
                else if (alim === 'Elettrico') matchAlim = prodAlim === 'elettrico' || prodAlim.includes('litio');
                else if (alim === 'Manuale') matchAlim = prodAlim === 'manuale';
            }
            let matchPortata = true;
            if (portata) {
                const parts = portata.split('-');
                matchPortata = parseVal(prod.specs.portata) >= parseInt(parts[0]) && parseVal(prod.specs.portata) <= parseInt(parts[1]);
            }
            let matchSollevamento = true;
            if (sollevamento) {
                const parts = sollevamento.split('-');
                matchSollevamento = parseVal(prod.specs.altezza) >= parseInt(parts[0]) && parseVal(prod.specs.altezza) <= parseInt(parts[1]);
            }
            let matchMarca = !marca || prod.specs.marca.toUpperCase() === marca.toUpperCase();
            return matchCat && matchAnno && matchAlim && matchPortata && matchSollevamento && matchMarca;
        });

        log('Filtrati: ' + filtered.length + ' prodotti');

        resultsGrid.innerHTML = '';
        if (filtered.length === 0) {
            resultsGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;background:#fff;">Nessun carrello trovato</div>';
            resultsCount.textContent = '0 Carrelli Trovati';
            return;
        }

        resultsCount.textContent = filtered.length + ' Carrelli Trovati';
        filtered.forEach(prod => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = '<div class="product-info"><h3 class="product-name">' + prod.name + '</h3><p>' + prod.description + '</p></div>';
            resultsGrid.appendChild(card);
        });

        log('Cards renderizzate: ' + resultsGrid.children.length);
    }

    // Event listeners
    [selectCategoria, selectAnno, selectAlimentazione, selectPortata, selectSollevamento, selectMarca].forEach(s => {
        if (s) s.addEventListener('change', renderProducts);
    });
    if (btnCerca) btnCerca.addEventListener('click', function(e) { e.preventDefault(); renderProducts(); });

    // Init render
    renderProducts();
    log('\n=== TEST COMPLETATO CON SUCCESSO ===');
    log('Se vedi le card sotto, il JavaScript funziona!');

} catch(err) {
    log('ERRORE CRITICO: ' + err.message);
    log('Stack: ' + err.stack);
}
</script>
</body>
</html>
